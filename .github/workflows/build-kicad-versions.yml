name: Auto release for multiple KiCad versions

on:
  push:
    tags:
      - "v[0-9]*.[0-9]*"

jobs:
  update-dockerfile:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        kicad_version:
          [
            "8.0",
            "9.0",
            "9.0.1",
            "9.0.2",
            "9.0.3",
            "9.0.4",
            "9.0.5",
            "9.0.6",
            "9.0.7",
            "9.0.8",
            "9.0.9",
            "10.0",
            "10.0.0",
            "10.0.1",
            "10.0.2",
          ]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Extract Version from tag and create branch name
        run: |
          git config --global user.name "${{ github.actor }}"
          git config --global user.email "${{ github.actor }}@users.noreply.github.com"
          echo "action_version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV
          echo "branch_name=release-k${{ matrix.kicad_version }}" >> $GITHUB_ENV

      - name: Update Dockerfile with KiCad Version ${{ matrix.kicad_version }}
        run: |
          git checkout -b ${{ env.branch_name }}
          git fetch origin
          git reset --hard v${{ env.action_version }}

          # Update Dockerfile with the appropriate KiCad version
          sed -i 's|FROM kicad/kicad:.*|FROM kicad/kicad:${{ matrix.kicad_version }}|' Dockerfile

          # Check if there are changes in the Dockerfile
          if git diff --exit-code Dockerfile; then
              echo "No changes to Dockerfile, skipping commit."
          else
              git add Dockerfile
              git commit -m "Update Dockerfile for KiCad ${{ matrix.kicad_version }}"

              # Force push the changes, setting upstream
              git push origin ${{ env.branch_name }} --force
          fi

      - name: Create Git Tag and Release
        run: |
          # Find the most recent simple tag (without -kicad suffix) to use as a reference for release notes
          PREV_SIMPLE_TAG=$(git tag --list 'v[0-9]*.[0-9]*' | grep -E '^v[0-9]+\.[0-9]+$' | grep -v "^v${{ env.action_version }}$" | sort -V | tail -n1 || true)
          if [ -n "$PREV_SIMPLE_TAG" ]; then
            PREV_SIMPLE_TAG_COMMIT=$(git rev-list -n1 "$PREV_SIMPLE_TAG")
            echo "Previous simple tag: $PREV_SIMPLE_TAG"
            echo "Previous commit hash: $PREV_SIMPLE_TAG_COMMIT"
          fi

          TAG="v${{ env.action_version }}-k${{ matrix.kicad_version }}"
          git tag "$TAG"
          git push origin "$TAG"

          # Check if version is the latest major.minor version to make sure it is marked as latest release on GitHub
          LATEST_MAJOR_MINOR=$(grep -oE '"[0-9]+\.[0-9]+"' .github/workflows/build-kicad-versions.yml | grep -oE '[0-9]+\.[0-9]+' | sort -uV | tail -n1)
          LATEST_FLAG=""
          if [ "${{ matrix.kicad_version }}" = "$LATEST_MAJOR_MINOR" ]; then
            LATEST_FLAG="--latest"
          fi

          if [ -n "$PREV_SIMPLE_TAG" ]; then
            gh release create "$TAG" --title "v${{ env.action_version }}-k${{ matrix.kicad_version }}" --generate-notes --notes-start-tag "$PREV_SIMPLE_TAG" $LATEST_FLAG
          else
            gh release create "$TAG" --title "v${{ env.action_version }}-k${{ matrix.kicad_version }}" --generate-notes $LATEST_FLAG
          fi

          MAIN_VERSION_TAG="v$(echo ${{ env.action_version }} | grep -oE '^[0-9]+')-k${{ matrix.kicad_version }}"
          git tag -f $MAIN_VERSION_TAG
          git push -f origin $MAIN_VERSION_TAG
        env:
          GH_TOKEN: ${{ github.token }}
